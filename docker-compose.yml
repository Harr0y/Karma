services:
  karma:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: karma-api
    restart: unless-stopped
    ports:
      - "3080:3080"
    environment:
      # GLM API 配置
      - ANTHROPIC_AUTH_TOKEN=${ANTHROPIC_AUTH_TOKEN}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://open.bigmodel.cn/api/anthropic}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-glm-5}
      # 存储路径 (容器内)
      - HOME=/home/karma
      # 代理配置 (访问 Telegram API) - macOS Docker Desktop 用 host.docker.internal
      - HTTP_PROXY=http://host.docker.internal:7890
      - HTTPS_PROXY=http://host.docker.internal:7890
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      # 持久化数据库
      - karma-data:/home/karma/.karma
      # 配置文件
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  karma-data:
    driver: local
