# Karma 配置文件
# 复制此文件到 ~/.karma/config.yaml 或 ./config.yaml
#
# 环境区分:
# - 生产环境: 使用此文件 (config.yaml)
# - 测试环境: 使用 config.test.yaml (见 config.test.example.yaml)

# 服务器配置
server:
  host: ${KARMA_SERVER_HOST:0.0.0.0}  # 监听地址，0.0.0.0 允许外部访问
  port: ${KARMA_SERVER_PORT:3000}     # 监听端口

# AI 配置
ai:
  # API 配置
  authToken: ${ANTHROPIC_AUTH_TOKEN:}
  baseUrl: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-5-20250929}
  timeout: ${API_TIMEOUT_MS:300000}

# 存储配置
storage:
  type: sqlite
  path: ~/.karma/karma.db

# Skills 配置
skills:
  dirs:
    - ~/.karma/skills
    - ./skills
  autoLoad: true

# 日志配置
logging:
  level: info
  file: ~/.karma/logs/karma.log

# Telegram 配置 (可选)
telegram:
  botToken: ${TELEGRAM_BOT_TOKEN:}           # Bot Token (from BotFather)
  enabled: false                              # 是否启用 Telegram 适配器
  maxMessageLength: 4096                      # 最大消息长度
  apiRetryAttempts: 3                         # API 重试次数
  apiRetryDelay: 1000                         # API 重试延迟 (毫秒)
  pollingInterval: 1000                       # Polling 轮询间隔 (毫秒)
  pollingTimeout: 30                          # Long polling 超时 (秒)
