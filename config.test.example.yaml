# Karma 配置文件 - 测试环境
# 复制此文件到 ./config.test.yaml

# 服务器配置
server:
  host: ${KARMA_SERVER_HOST:0.0.0.0}
  port: ${KARMA_SERVER_PORT:3080}

# AI 配置
ai:
  authToken: ${ANTHROPIC_AUTH_TOKEN:}
  baseUrl: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
  model: ${ANTHROPIC_MODEL:claude-sonnet-4-5-20250929}
  timeout: ${API_TIMEOUT_MS:300000}

# 存储配置
storage:
  type: sqlite
  path: ~/.karma/karma-test.db  # 测试环境独立数据库

# Skills 配置
skills:
  dirs:
    - ~/.karma/skills
    - ./skills
  autoLoad: true

# 日志配置 (测试环境更详细)
logging:
  level: debug
  file: ~/.karma/logs/karma-test.log

# Telegram 配置 (测试 Bot)
telegram:
  botToken: ${TELEGRAM_BOT_TOKEN:}
  enabled: false
  maxMessageLength: 4096
  apiRetryAttempts: 3
  apiRetryDelay: 1000
  pollingInterval: 1000                       # Polling 轮询间隔 (毫秒)
  pollingTimeout: 30                          # Long polling 超时 (秒)
